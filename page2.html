  <script>
    window.addEventListener("load", () => {

      const roll = Math.floor(Math.random() * 6) + 1;

      if (roll === 1) {

        const img = document.getElementById("flash-image");

        if (img) {
          img.style.display = "block";

          setTimeout(() => {
            img.style.display = "none";
          }, 200);
        }
      }
    });
  </script>

</head>

<body>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
  </div>

  <!-- SLIDER -->
  <div id="slider" class="lightbox">

    <span class="close" onclick="closeSlider()">✕</span>
    <span class="prev" onclick="changeSlide(-1)">❮</span>

    <img id="slider-img">

    <span class="next" onclick="changeSlide(1)">❯</span>

  </div>

  <!-- IMAGE FLASH SECRÈTE -->
  <img id="flash-image" src="images/p7.png" alt="flash">

  <script>

    function openLightbox(src) {
      document.getElementById("lightbox").style.display = "flex";
      document.getElementById("lightbox-img").src = src;
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }

    const sliderImages = [
      "images/t7.jpg",
      "images/t8.jpg",
      "images/t9.jpg"
    ];

    let currentSlide = 0;

    function openSlider() {
      document.getElementById("slider").style.display = "flex";
      document.getElementById("slider-img").src = sliderImages[currentSlide];
    }

    function closeSlider() {
      document.getElementById("slider").style.display = "none";
    }

    function changeSlide(direction) {

      currentSlide += direction;

      if (currentSlide < 0) {
        currentSlide = sliderImages.length - 1;
      }

      if (currentSlide >= sliderImages.length) {
        currentSlide = 0;
      }

      document.getElementById("slider-img").src = sliderImages[currentSlide];
    }

  </script>

  <a href="index.html" class="back-home">← GO HOME??</a>
